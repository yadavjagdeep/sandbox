version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: flashsale
      POSTGRES_PASSWORD: flashsale
      POSTGRES_DB: flashsale
    ports:
      - "5432:5432"
    volumes:
      - ./migration/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "flashsale"]
      interval: 5s
      retries: 5

  # Redis: using host Redis (already running on localhost:6379)
  # If you need a container: uncomment below
  # redis:
  #   image: redis:7
  #   ports:
  #     - "6379:6379"

volumes:
  pgdata:
