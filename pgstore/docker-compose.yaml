version: '3.9'

services:
  primary:
    image: postgres:16
    container_name: pgstore-primary
    environment:
      POSTGRES_USER: pgstore
      POSTGRES_PASSWORD: pgstore123
      POSTGRES_DB: pgstore
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=3
      -c hot_standby=on
      -c listen_addresses='*'
    ports:
      - "5432:5432"
    volumes:
      - pgstore-primary-data:/var/lib/postgresql/data
      - ./init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh

  replica:
    image: postgres:16
    container_name: pgstore-replica
    environment:
      PGPASSWORD: replicator123
    entrypoint: /bin/bash
    command: -c "
      chown -R postgres:postgres /var/lib/postgresql/data;
      chmod 700 /var/lib/postgresql/data;
      until pg_isready -h primary -U pgstore; do sleep 1; done;
      if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
        gosu postgres pg_basebackup -h primary -U replicator -D /var/lib/postgresql/data -Fp -Xs -R;
      fi;
      exec gosu postgres postgres -c hot_standby=on
      "
    ports:
      - "5433:5432"
    depends_on:
      - primary
    volumes:
      - pgstore-replica-data:/var/lib/postgresql/data


  shard1:
    image: postgres:16
    container_name: pgstore-shard1
    environment:
      POSTGRES_USER: pgstore
      POSTGRES_PASSWORD: pgstore123
      POSTGRES_DB: pgstore
    ports:
      - "5434:5432"
    volumes:
      - pgstore-shard1-data:/var/lib/postgresql/data
  
  shard2:
    image: postgres:16
    container_name: pgstore-shard2
    environment:
      POSTGRES_USER: pgstore
      POSTGRES_PASSWORD: pgstore123
      POSTGRES_DB: pgstore
    ports:
      - "5435:5432"
    volumes:
      - pgstore-shard2-data:/var/lib/postgresql/data

volumes:
  pgstore-primary-data:
  pgstore-replica-data:
  pgstore-shard1-data:
  pgstore-shard2-data:
