apiVersion: apps/v1
kind: Deployment
metadata:
  name: caller
  labels:
    app: caller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caller
  template:
    metadata:
      labels:
        app: caller
    spec:
      containers:
        - name: caller
          image: caller:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: caller
spec:
  selector:
    app: caller
  ports:
    - port: 8081
      targetPort: 8081
