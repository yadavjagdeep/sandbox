version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cricket
      POSTGRES_PASSWORD: cricket
      POSTGRES_DB: cricket
    ports:
      - "5432:5432"
    volumes:
      - ./migration/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "cricket"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
